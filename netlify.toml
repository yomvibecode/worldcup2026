[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/standings"
  to = "/.netlify/functions/standings"
  status = 200

[[redirects]]
  from = "/api/matches"
  to = "/.netlify/functions/matches"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
